<!DOCTYPE html>
<html>
<head>
    <meta charset=utf-8>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Marblizer</title>
    <meta name="description" content="Interactive paper marbling simulation. Create awesome patterns.">
    <meta name="author" content="Nick Walker"/>
    <meta property="og:image" content="https://marblizer.nickwalker.us/media/images/og-banner.jpg"/>
    <link rel="canonical" href="https://marblizer.nickwalker.us/">

    <link rel="shortcut icon" href="/media/images/favicon.png"/>
    <link rel="apple-touch-icon" href="/media/images/apple-touch-icon.png">
    <link rel="mask-icon" href="/media/images/mask.svg" color="#891920">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#891920">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Marblizer">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="media/css/style.css"/>
    <script src="/dist/index.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/codemirror.min.css" integrity="sha512-uf06llspW44/LZpHzHT6qBOIVODjWtv4MxCricRxkzvopAlSWnTf6hpZTFxuuZcuNE9CBQhqE0Seu1CoRk84nQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <script>
        window.goatcounter = {
            path: function (p) {
                return "marblizer." + p;
            },
        }
        // Only run stats on live site
        if (window.location.hostname !== "marblizer.nickwalker.us") {
            window.goatcounter = undefined
        }
    </script>
    <script async
            data-goatcounter="https://nickwalker.us/stats/count" data-proofer-ignore src="https://nickwalker.us/stats/count.js"></script>

</head>
<body>
<div id="workspace">

</div>

<div class="modal-container" style="display:none;">
    <div id="operations-input" class="marbling-pane center-pane">
        <div class="button-section">
            <button type="button" class="run-button tool" title="Execute"><ion-icon name="play-outline" aria-hidden="true"></ion-icon></button>
            <button type="button" class="upload-button tool" title="Upload script"><ion-icon name="cloud-upload-outline" aria-hidden="true"></ion-icon></button>
            <button type="button" class="download-button tool" title="Download script"><ion-icon name="cloud-download-outline" aria-hidden="true"></ion-icon></button>
            <button type="button" class="get-url-button tool" title="Share URL"><ion-icon name="share-outline" aria-hidden="true"></ion-icon></button>
            <button type="button" class="examples-button tool" title="Load example"><ion-icon name="library-outline" aria-hidden="true"></ion-icon></button>
            <button type="button" class="api-docs-button tool" title="Scripting API docs"><ion-icon name="book-outline" aria-hidden="true"></ion-icon></button>
            <button type="button" class="close-button tool" title="Close"><ion-icon name="close-outline" aria-hidden="true"></ion-icon></button>
        </div>
        <hr class="tools-divider">
        <div class="input-container"></div>
    </div>
</div>

<div id="marbling-tools" class="marbling-pane">
    <div class="button-section" id="tools">
        <button type="button" class="drop-tool tool" title="Ink drop"><img src="media/images/drop.svg"/></button>
        <button type="button" class="spatter-tool tool" title="Spatter"><img src="media/images/spatter.svg"/></button>
        <button type="button" class="tine-tool tool" title="Tine line"><img src="media/images/tine-line.svg"/></button>
        <button type="button" class="wavy-tine-tool tool" title="Wavy "><img src="media/images/wavy-tine.svg"></button>
        <button type="button" class="circular-tine-tool tool" title="Circular tine-line"><img src="media/images/circular-tine.svg"></button>
        <button type="button" class="vortex-tool tool" title="Vortex"><img src="media/images/vortex.svg"/></button>
    </div>
    <div id="tool-parameters"></div>
    <hr class="tools-divider divider-options">
    <div class="button-section options" id="options">
        <button type="button" class="undo tool" title="Undo"><ion-icon name="arrow-undo-outline" aria-hidden="true"></ion-icon></button>
        <button type="button" class="redo tool" title="Redo"><ion-icon name="arrow-redo-outline" aria-hidden="true"></ion-icon></button>
        <button type="button" class="show-field tool" title="Show tool force field"><ion-icon name="search-outline" aria-hidden="true"></ion-icon></button>
        <button type="button" class="fullscreen tool" title="Toggle fullscreen"><ion-icon name="expand-outline" aria-hidden="true"></ion-icon></button>
        <button type="button" class="toggle-renderer tool" title="Switch rendering backend" style="display:none;"><ion-icon name="hardware-chip-outline" aria-hidden="true"></ion-icon></button>
        <button type="button" class="reset tool" title="Reset canvas"><ion-icon name="close-circle-outline" aria-hidden="true"></ion-icon></button>
        <button type="button" class="save-image tool" title="Save PNG"><ion-icon name="download-outline" aria-hidden="true"></ion-icon></button>
        <button type="button" class="save-svg tool" title="Save SVG"><ion-icon name="document-outline" aria-hidden="true"></ion-icon></button>
        <button type="button" class="show-script-editor tool" title="Script editor"><ion-icon name="code-slash-outline" aria-hidden="true"></ion-icon></button>
        <button type="button" class="help tool" title="Help"><ion-icon name="help-circle-outline" aria-hidden="true"></ion-icon></button>
    </div>
    <hr class="tools-divider divider-colors">
    <div id="colors">
        <div id="color-inputs">
            <input type="color" class="color-picker foreground" value="#891920" title="Foreground color">
            <input type="color" class="color-picker background" value="#DCD2D2" title="Background color">
        </div>
        <div class="button-section" id="recent-colors">
            <button type="button" class="swatch-0" title="Recent color"></button>
            <button type="button" class="swatch-1" title="Recent color"></button>
            <button type="button" class="swatch-2" title="Recent color"></button>
            <button type="button" class="swatch-3" title="Recent color"></button>
            <button type="button" class="swatch-4" title="Recent color"></button>
        </div>
    </div>
    <div id="logo"><img src="media/images/logo.svg"/></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>



</body>
</html>
